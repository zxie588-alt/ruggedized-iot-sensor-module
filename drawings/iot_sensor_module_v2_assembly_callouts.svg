<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#ffffff"/>
  <text x="60" y="55" font-family="Arial" font-size="28" font-weight="700" fill="#172033">DWG-002: Ruggedized IoT Sensor Module V2 - Assembly Callouts</text>
  <text x="60" y="86" font-family="Arial" font-size="16" fill="#526070">Concept exploded callout drawing. Units: mm. Not a manufacturing-controlled drawing.</text>

  <g stroke="#172033" stroke-width="3" fill="#f3f6fb">
    <rect x="240" y="140" width="520" height="90" rx="18"/>
    <rect x="270" y="270" width="460" height="26" rx="8" fill="#e8f0ff"/>
    <rect x="320" y="330" width="360" height="74" rx="8" fill="#f9fbff"/>
    <rect x="350" y="435" width="300" height="54" rx="6" fill="#fff8e8"/>
    <rect x="220" y="530" width="560" height="100" rx="22"/>
  </g>

  <text x="810" y="180" font-family="Arial" font-size="20" fill="#172033">1. Upper lid with gasket compression rib</text>
  <text x="810" y="290" font-family="Arial" font-size="20" fill="#172033">2. Elastomer gasket path</text>
  <text x="810" y="365" font-family="Arial" font-size="20" fill="#172033">3. Populated PCB envelope</text>
  <text x="810" y="465" font-family="Arial" font-size="20" fill="#172033">4. Battery pack envelope + restraint</text>
  <text x="810" y="585" font-family="Arial" font-size="20" fill="#172033">5. Lower enclosure with strap lugs and service port</text>

  <g stroke="#2d6cdf" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M760 185 H800"/>
    <path d="M730 283 H800"/>
    <path d="M680 365 H800"/>
    <path d="M650 462 H800"/>
    <path d="M780 580 H800"/>
  </g>

  <g font-family="Arial" font-size="17" fill="#526070">
    <text x="250" y="130">strap lug pair and membrane boss visible on lid-side package</text>
    <text x="280" y="260">gasket must be visually checked before lid closure</text>
    <text x="330" y="320">PCB standoffs align to mounting markers</text>
    <text x="360" y="425">battery must be captured by restraint clips</text>
    <text x="230" y="650">lower case carries gasket groove, cable gland, service/debug port and lug load path</text>
  </g>

  <rect x="60" y="675" width="1080" height="55" fill="#f7f8fb" stroke="#ccd3df"/>
  <text x="80" y="707" font-family="Arial" font-size="16" fill="#172033">Assembly sequence: inspect gasket groove -> place PCB -> place battery -> fit gasket -> close lid -> tighten screws in cross pattern -> inspect service port and cable gland.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2d6cdf"/>
    </marker>
  </defs>
</svg>
