  <text x="80" y="685" font-family="Arial" font-size="16" fill="#172033">Key features: gasket groove path, M3-style screw boss rings, rear strap lugs, side service/debug port, front cable-gland feature, sensor membrane boss.</text>
  <text x="80" y="710" font-family="Arial" font-size="16" fill="#172033">Evidence boundary: dimensions are concept-level and must be checked against final CAD drawing sheets, tolerance stack-up and physical validation.</text>

