<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520">
  <rect width="1100" height="520" fill="#f7f8fb"/>
  <text x="50" y="60" font-family="Arial" font-size="32" font-weight="700" fill="#172033">Firmware State Machine</text>
  <g font-family="Arial" font-size="18" fill="#172033" stroke="#2d6cdf" stroke-width="2">
    <rect x="70" y="120" width="130" height="58" rx="8" fill="#ffffff"/><text x="108" y="156">BOOT</text>
    <rect x="250" y="120" width="130" height="58" rx="8" fill="#ffffff"/><text x="272" y="156">SELF_TEST</text>
    <rect x="430" y="120" width="130" height="58" rx="8" fill="#ffffff"/><text x="466" y="156">SLEEP</text>
    <rect x="610" y="120" width="130" height="58" rx="8" fill="#ffffff"/><text x="645" y="156">SAMPLE</text>
    <rect x="790" y="120" width="130" height="58" rx="8" fill="#ffffff"/><text x="827" y="156">FILTER</text>
    <rect x="790" y="270" width="130" height="58" rx="8" fill="#ffffff"/><text x="808" y="306">TRANSMIT</text>
    <rect x="610" y="270" width="130" height="58" rx="8" fill="#fff8e8"/><text x="620" y="306">LOW_BATTERY</text>
    <rect x="430" y="270" width="130" height="58" rx="8" fill="#fff0f0"/><text x="466" y="306">FAULT</text>
    <rect x="250" y="270" width="130" height="58" rx="8" fill="#eef6ff"/><text x="281" y="306">SERVICE</text>
  </g>
  <g stroke="#2d6cdf" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M200 149 H250"/>
    <path d="M380 149 H430"/>
    <path d="M560 149 H610"/>
    <path d="M740 149 H790"/>
    <path d="M855 178 V270"/>
    <path d="M790 299 H740"/>
    <path d="M610 299 H560"/>
    <path d="M495 270 V178"/>
    <path d="M430 299 H380"/>
    <path d="M315 270 V178"/>
  </g>
  <text x="70" y="410" font-family="Arial" font-size="18" fill="#526070">Fault and low-battery transitions can be triggered from sampling, filtering or transmit checks.</text>
  <text x="70" y="442" font-family="Arial" font-size="18" fill="#526070">Service mode is entered through the sealed debug/service port and exits back to sleep after maintenance.</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2d6cdf"/>
    </marker>
  </defs>
</svg>
