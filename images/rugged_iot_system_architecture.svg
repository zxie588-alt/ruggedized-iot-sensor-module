<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Ruggedized outdoor IoT sensor module system architecture</title>
  <desc id="desc">Architecture diagram for ruggedized IoT sensor enclosure, electronics, firmware and validation fixtures.</desc>
  <rect width="1200" height="720" fill="#f6f8f7"/>
  <text x="52" y="62" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="#1f2a2e">Ruggedized Outdoor IoT Sensor Module</text>
  <text x="52" y="96" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5e6a70">Step 1 architecture: enclosure, electronics, firmware and validation package.</text>

  <rect x="70" y="150" width="390" height="380" rx="10" fill="#ffffff" stroke="#d9e0df" stroke-width="2"/>
  <text x="100" y="190" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#1f2a2e">Mechanical Product</text>
  <rect x="140" y="250" width="230" height="145" rx="22" fill="#dfeaf1" stroke="#1f2a2e" stroke-width="3"/>
  <rect x="162" y="272" width="186" height="98" rx="14" fill="#eef3f6" stroke="#90a4ae" stroke-width="2"/>
  <circle cx="180" cy="420" r="12" fill="#1f2a2e"/>
  <circle cx="332" cy="420" r="12" fill="#1f2a2e"/>
  <path d="M176 420 C210 470 302 470 336 420" fill="none" stroke="#1f2a2e" stroke-width="10"/>
  <text x="112" y="470" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5e6a70">Gasket, screw bosses, ribs, strap mount, service port</text>

  <rect x="505" y="150" width="285" height="170" rx="10" fill="#ffffff" stroke="#d9e0df" stroke-width="2"/>
  <text x="535" y="190" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1f2a2e">Proteus Electronics</text>
  <rect x="555" y="225" width="76" height="44" fill="#0aa36f" stroke="#1f2a2e"/>
  <rect x="660" y="225" width="76" height="44" fill="#2f72d0" stroke="#1f2a2e"/>
  <rect x="610" y="270" width="76" height="28" fill="#f5c04a" stroke="#1f2a2e"/>
  <text x="548" y="302" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5e6a70">MCU, sensor, battery, regulator, LED</text>

  <rect x="505" y="360" width="285" height="170" rx="10" fill="#ffffff" stroke="#d9e0df" stroke-width="2"/>
  <text x="535" y="400" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1f2a2e">Keil Firmware</text>
  <text x="540" y="442" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5e6a70">Sleep -> wake -> read sensor</text>
  <text x="540" y="472" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5e6a70">Validate -> transmit/log -> fault</text>
  <text x="540" y="502" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5e6a70">Hardware target to be fixed later</text>

  <rect x="845" y="150" width="285" height="380" rx="10" fill="#ffffff" stroke="#d9e0df" stroke-width="2"/>
  <text x="875" y="190" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#1f2a2e">Validation Package</text>
  <rect x="890" y="235" width="200" height="42" rx="8" fill="#e8f4f2" stroke="#007c73"/>
  <text x="925" y="262" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#005f58">Strap pull fixture</text>
  <rect x="890" y="300" width="200" height="42" rx="8" fill="#fff3e8" stroke="#d86e20"/>
  <text x="914" y="327" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#8a3b00">Drop orientation fixture</text>
  <rect x="890" y="365" width="200" height="42" rx="8" fill="#eef3f6" stroke="#90a4ae"/>
  <text x="934" y="392" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#1f2a2e">Spray stand</text>
  <rect x="890" y="430" width="200" height="42" rx="8" fill="#f4f4ee" stroke="#5e6a70"/>
  <text x="916" y="457" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#1f2a2e">Thermal logging setup</text>

  <path d="M460 315 H505" stroke="#007c73" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M790 235 H845" stroke="#007c73" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M790 445 H845" stroke="#007c73" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="70" y="585" width="1060" height="70" rx="10" fill="#ffffff" stroke="#d9e0df"/>
  <text x="100" y="628" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#1f2a2e">Evidence boundary: no IP rating, no physical test data and no production-ready claim until those steps are actually completed.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#007c73"/>
    </marker>
  </defs>
</svg>
